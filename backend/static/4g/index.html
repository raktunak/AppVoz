<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda 4G — tu vida en un Canva</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #171f29; --card: #1d2733; --line: #2a3645;
      --txt: #e6edf3; --muted: #8b98a8; --accent: #6fae3a; --accent2: #4a90d9;
      --done: #3a8c5e; --warn: #caa14a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column;
    }
    header {
      display: flex; align-items: center; gap: 16px; padding: 14px 22px;
      border-bottom: 1px solid var(--line); background: var(--panel);
    }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 13px; }
    .grow { flex: 1; }
    button.mic {
      border: 0; border-radius: 999px; padding: 10px 20px; font-size: 15px; font-weight: 600;
      cursor: pointer; background: var(--accent); color: #06210a;
    }
    button.mic.on { background: #d9694a; color: #2a0d06; }
    a.cfg { text-decoration: none; color: var(--muted); border: 1px solid var(--line);
      border-radius: 999px; padding: 9px 16px; font-size: 14px; }
    a.cfg:hover { color: var(--txt); border-color: var(--accent2); }
    button.reset { border: 1px solid var(--line); background: transparent; color: var(--muted);
      border-radius: 999px; padding: 9px 14px; font-size: 14px; cursor: pointer; }
    button.reset:hover { color: #e9bfbf; border-color: #8a3a3a; }
    #status { color: var(--muted); font-size: 13px; }
    main { flex: 1; display: flex; min-height: 0; }

    /* Stepper izquierda */
    nav {
      width: 230px; border-right: 1px solid var(--line); background: var(--panel);
      padding: 18px 12px; overflow-y: auto;
    }
    .step {
      display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 10px;
      color: var(--muted); font-size: 14px; cursor: default; margin-bottom: 4px;
    }
    .step .dot {
      width: 22px; height: 22px; border-radius: 999px; border: 2px solid var(--line);
      display: flex; align-items: center; justify-content: center; font-size: 12px; flex: 0 0 auto;
    }
    .step.active { color: var(--txt); background: var(--card); }
    .step.active .dot { border-color: var(--accent2); color: var(--accent2); }
    .step.done { color: var(--txt); }
    .step.done .dot { background: var(--done); border-color: var(--done); color: #fff; }

    /* Canva centro */
    section.canva { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .cv {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px;
      min-height: 96px;
    }
    .cv.active { border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent2) inset; }
    .cv.done { border-color: var(--done); }
    .cv-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .cv h3 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .cv.done h3::after { content: " ✓"; color: var(--done); }
    /* botón "Hablar" por sección (abre/cierra su conversación de voz) */
    .hablar { border: 0; border-radius: 999px; padding: 6px 13px; font-size: 12.5px; font-weight: 600;
      cursor: pointer; background: var(--accent2); color: #04121f; white-space: nowrap; flex: 0 0 auto; }
    .hablar.on { background: #d9694a; color: #2a0d06; }
    .hablar.rev { background: transparent; border: 1px solid var(--line); color: var(--muted); }
    .hablar.rev:hover { color: var(--txt); border-color: var(--accent2); }
    .cv .val { font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
    .cv .empty { color: #5a6776; font-style: italic; font-size: 14px; }
    .chip {
      display: inline-block; background: #223; border: 1px solid var(--line); border-radius: 999px;
      padding: 4px 10px; margin: 3px 4px 0 0; font-size: 13px;
    }
    .chip small { color: var(--muted); }
    .booked { margin-top: 10px; padding: 10px 12px; border-radius: 10px; background: #14301c;
      border: 1px solid var(--done); color: #bfe9cf; font-size: 14px; }
    .booked a { color: #9fe3b6; }
    .booked.err { background: #301717; border-color: #8a3a3a; color: #e9bfbf; }
    /* apartados (sub-campos que se rellenan y se ponen en verde en vivo) */
    .apart { padding: 8px 0; border-bottom: 1px solid var(--line); }
    .apart:last-child { border-bottom: 0; }
    .apart-q { font-size: 13.5px; color: var(--muted); line-height: 1.35; }
    .apart-a { font-size: 14.5px; color: #5a6776; font-style: italic; margin-top: 3px; }
    .apart.done .apart-q { color: var(--txt); }
    .apart.done .apart-q::before { content: "✓ "; color: var(--done); }
    .apart.done .apart-a { color: #bfe9cf; font-style: normal; }
    .seccion-q { font-size: 13.5px; color: var(--muted); line-height: 1.35; margin-bottom: 8px; }
    /* desplegable de pruebas: prompt inyectado a Faro por sección */
    .promptbox { margin-top: 10px; }
    .promptbox summary { cursor: pointer; font-size: 12px; color: var(--muted); user-select: none; list-style: none; }
    .promptbox summary:hover { color: var(--accent2); }
    .promptbox pre { white-space: pre-wrap; font-size: 11.5px; line-height: 1.45; color: #9fb0c0;
      background: #11181f; border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; margin: 7px 0 0; }

    /* Transcripción abajo */
    aside {
      width: 300px; border-left: 1px solid var(--line); background: var(--panel);
      padding: 16px; overflow-y: auto; font-size: 14px;
    }
    aside h4 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; }
    .msg { margin-bottom: 10px; line-height: 1.45; }
    .msg .who { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .msg.user .who { color: var(--accent2); }
    .msg.bot .who { color: var(--accent); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Agenda 4G <span class="sub">· tu vida en un Canva</span></h1>
    <div class="grow"></div>
    <span id="status">Conectando…</span>
    <button id="reset" class="reset" title="Borra tu Canva y tus citas de prueba — empezar de cero">↺ Reiniciar</button>
    <a class="cfg" href="/call?svc=4g" title="Configuración del servicio 4g (modelo, voz, persona, VAD)">⚙ Configuración</a>
  </header>
  <main>
    <nav id="stepper"></nav>
    <section class="canva">
      <div class="grid" id="grid"></div>
    </section>
    <aside>
      <h4>Conversación</h4>
      <div id="chat"></div>
    </aside>
  </main>
  <script src="app.js"></script>
</body>
</html>
